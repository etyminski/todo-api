name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test
        env:
          JWT_SECRET: chave-secreta-exemplo
          NODE_ENV: test

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Simulate deploy
        run: echo "Deploy successful"